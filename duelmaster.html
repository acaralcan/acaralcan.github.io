<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Duel Master</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0a1e;
            color: #fff;
            font-family: 'Arial', sans-serif;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .ust-bar {
            background: #000;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ffd700;
            flex-shrink: 0;
        }

        .btn-anasayfa {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .puan {
            color: #00ff00;
            font-weight: bold;
            font-size: 18px;
        }

        .oyun-alani {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 15px;
            overflow-y: auto;
            padding-bottom: 100px;
        }

        .kart-sirasi {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .kart-slot {
            width: 90px;
            height: 130px;
            border: 2px solid #444;
            border-radius: 10px;
            background: #1a1233;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 12px;
            position: relative;
            z-index: 2;
        }

        .kart-slot.bos {
            border: 2px dashed #ffd700;
        }

        .savas-alani-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 150px;
            margin: 10px 0;
        }

        .savas-alani-yazi {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            z-index: 1;
            letter-spacing: 4px;
        }

        .kart {
            width: 85px;
            height: 125px;
            border-radius: 8px;
            padding: 5px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            z-index: 3;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.6);
        }

        .kart.mistik {
            background: linear-gradient(135deg, #2d1b4e, #1a0f2e);
            border: 2px solid #ff00ff;
        }

        .kart.canavar {
            background: linear-gradient(135deg, #4d1a1a, #2e0f0f);
            border: 2px solid #ff0000;
        }

        .kart.duvar {
            background: linear-gradient(135deg, #1a2a4d, #0f1a2e);
            border: 2px solid #0088ff;
        }

        .kart-baslik {
            font-size: 9px;
            font-weight: bold;
            color: #ffd700;
            text-align: center;
        }

        .kart-isim {
            font-size: 11px;
            text-align: center;
            font-weight: bold;
        }

        .el-kartlar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, #0f0a1e 80%, transparent);
            padding: 10px 10px 20px 10px;
            display: flex;
            gap: 8px;
            justify-content: center;
            overflow-x: auto;
            z-index: 10;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
        }

        .el-kart {
            width: 75px;
            height: 110px;
            flex-shrink: 0;
            border-radius: 8px;
            padding: 4px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .el-kart:active {
            transform: translateY(-10px);
        }

        .cek-buton {
            width: 75px;
            height: 110px;
            background: #4d0000;
            border: 2px solid #ffd700;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }

        .cek-sayi {
            font-size: 28px;
            color: #ffd700;
        }
    </style>
</head>
<body>
    <div class="ust-bar">
        <a href="/" class="btn-anasayfa">← Ana Sayfa</a>
        <div class="sure">56</div>
        <div class="puan">SEN: 8000</div>
    </div>

    <div class="oyun-alani">
        <div class="kart-sirasi">
            <div class="kart-slot">RAKİP</div>
            <div class="kart-slot">RAKİP</div>
            <div class="kart-slot">RAKİP</div>
        </div>

        <div class="savas-alani-wrapper">
            <div class="savas-alani-yazi">SAVAŞ ALANI</div>
            <div class="kart mistik">
                <div class="kart-baslik">MISTIK</div>
                <div style="text-align:center;font-size:32px;">🛡️</div>
                <div class="kart-isim">Savunma Artışı</div>
            </div>
            <div class="kart-slot bos">BOŞ</div>
        </div>

        <div class="kart-sirasi">
            <div class="kart-slot">BOŞ</div>
            <div class="kart-slot">BOŞ</div>
            <div class="kart-slot">BOŞ</div>
        </div>
    </div>

    <div class="el-kartlar">
        <div class="el-kart kart canavar">
            <div class="kart-baslik">CANAVAR</div>
            <div style="text-align:center;font-size:28px;">🦂</div>
            <div class="kart-isim">ACAR</div>
        </div>
        <div class="el-kart kart canavar">
            <div class="kart-baslik">CANAVAR</div>
            <div style="text-align:center;font-size:28px;">🤖</div>
            <div class="kart-isim">Mecha Robo</div>
        </div>
        <div class="el-kart kart canavar">
            <div class="kart-baslik">CANAVAR</div>
            <div style="text-align:center;font-size:28px;">⚔️</div>
            <div class="kart-isim">Kara Şövalye</div>
        </div>
        <div class="el-kart kart duvar">
            <div class="kart-baslik">DUVAR</div>
            <div style="text-align:center;font-size:28px;">🧱</div>
            <div class="kart-isim">Taş</div>
        </div>
        <div class="cek-buton">
            <div class="cek-sayi">7</div>
            <div>ÇEK</div>
        </div>
    </div>
</body>
</html>
