<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Duel Master</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0a1e;
            color: #fff;
            font-family: 'Arial', sans-serif;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .ust-bar {
            background: #000;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ffd700;
            flex-shrink: 0;
        }

        .btn-anasayfa {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .puan {
            color: #00ff00;
            font-weight: bold;
            font-size: 18px;
        }

        .oyun-alani {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 15px;
            overflow-y: auto;
            padding-bottom: 100px;
        }

        .kart-sirasi {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .kart-slot {
            width: 90px;
            height: 130px;
            border: 2px solid #444;
            border-radius: 10px;
            background: #1a1233;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 12px;
            position: relative;
            z-index: 2;
        }

        .kart-slot.bos {
            border: 2px dashed #ffd700;
        }

        .savas-alani-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 150px;
            margin: 10px 0;
        }

        .savas-alani-yazi {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            z-index: 1;
            letter-spacing: 4px;
        }

        .kart {
            width: 85px;
            height: 125px;
            border-radius: 8px;
            padding: 5px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            z-index: 3;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.6);
        }

        .kart.mistik {
            background: linear-gradient(135deg, #2d1b4e, #1a0f2e);
            border: 2px solid #ff00ff;
        }

        .kart.canavar {
            background: linear-gradient(135deg, #4d1a1a, #2e0f0f);
            border: 2px solid #ff0000;
        }

        .kart.duvar {
            background: linear-gradient(135deg, #1a2a4d, #0f1a2e);
            border: 2px solid #0088ff;
        }

        .kart-baslik {
            font-size: 9px;
            font-weight: bold;
            color: #ffd700;
            text-align: center;
        }

        .kart-isim {
            font-size: 11px;
            text-align: center;
            font-weight: bold;
        }

        .el-kartlar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, #0f0a1e 80%, transparent);
            padding: 10px 10px 20px 10px;
            display: flex;
            gap: 8px;
            justify-content: center;
            overflow-x: auto;
            z-index: 10;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
        }

        .el-kart {
            width: 75px;
            height: 110px;
            flex-shrink: 0;
            border-radius: 8px;
            padding: 4px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .el-kart:active {
            transform: translateY(-10px);
        }

        .cek-buton {
            width: 75px;
            height: 110px;
            background: #4d0000;
            border: 2px solid #ffd700;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }

        .cek-sayi {
            font-size: 28px;
            color: #ffd700;
        }
    </style>
</head>
<body>
    <div class="ust-bar">
        <a href="/" class="btn-anasayfa">← Ana Sayfa</a>

    </div>

    <div class="el-kartlar">
        <div class="el-kart kart canavar">
            <div class="kart-baslik">CANAVAR</div>
            <div style="text-align:center;font-size:28px;">🦂</div>

        </div>
        <div class="el-kart kart canavar">
            <div class="kart-baslik">CANAVAR</div>
            <div style="text-align:center;font-size:28px;">🤖</div>

        </div>
        <div class="el-kart kart canavar">
            <div class="kart-baslik">CANAVAR</div>

        <div class="el-kart kart duvar">
            <div class="kart-baslik">DUVAR</div>
            <div style="text-align:center;font-size:28px;">🧱</div>
            <div class="kart-isim">Taş</div>
        </div>
        <div class="cek-buton">
            <div class="cek-sayi">7</div>
            <div>ÇEK</div>
        </div>
    </div>
</body>

<script>
const KART_HAVUZU = [
    {tip:'canavar', isim:'ACAR', emoji:'🦂', atk:3000, def:2500, resim:'https://image.pollinations.ai/prompt/anime%20king%20with%20golden%20crown%20red%20cape%20legendary%20aura%202d%20art?width=70&height=40&nologo=true', efsanevi: true},
    {tip:'canavar', isim:'Alev Ejderi', emoji:'🐉', atk:2400, def:2000, resim:'https://image.pollinations.ai/prompt/anime%20fire%20dragon%20breathing%20flames%20epic%202d%20art?width=70&height=40&nologo=true'},
    {tip:'canavar', isim:'Buz Kurdu', emoji:'🐺', atk:1700, def:1200, resim:'https://image.pollinations.ai/prompt/anime%20ice%20wolf%20with%20glowing%20blue%20eyes%20snow%202d%20art?width=70&height=40&nologo=true'},
    {tip:'canavar', isim:'Yıldırım Anka', emoji:'⚡', atk:2000, def:1500, resim:'https://image.pollinations.ai/prompt/anime%20phoenix%20lightning%20bird%20yellow%20thunder%202d%20art?width=70&height=40&nologo=true'},
    {tip:'canavar', isim:'Kara Şövalye', emoji:'⚔️', atk:1900, def:1800, resim:'https://image.pollinations.ai/prompt/anime%20dark%20knight%20black%20armor%20sword%20shadow%202d%20art?width=70&height=40&nologo=true'},
    {tip:'canavar', isim:'Orman Perisi', emoji:'🧚', atk:1400, def:2000, resim:'https://image.pollinations.ai/prompt/anime%20forest%20fairy%20green%20wings%20nature%20magic%202d%20art?width=70&height=40&nologo=true'},
    {tip:'canavar', isim:'Gölge İblis', emoji:'👹', atk:2200, def:1600, resim:'https://image.pollinations.ai/prompt/anime%20shadow%20demon%20oni%20purple%20horns%20scary%202d%20art?width=70&height=40&nologo=true'},
    {tip:'canavar', isim:'Altın Golem', emoji:'🗿', atk:1600, def:2400, resim:'https://image.pollinations.ai/prompt/anime%20golden%20golem%20rock%20monster%20shining%202d%20art?width=70&height=40&nologo=true'},
    {tip:'canavar', isim:'Deniz Canavarı', emoji:'🐙', atk:2100, def:1700, resim:'https://image.pollinations.ai/prompt/anime%20kraken%20sea%20monster%20tentacles%20ocean%202d%20art?width=70&height=40&nologo=true'},
    {tip:'canavar', isim:'Rüzgar Kartalı', emoji:'🦅', atk:1800, def:1400, resim:'https://image.pollinations.ai/prompt/anime%20wind%20eagle%20storm%20flying%20feathers%202d%20art?width=70&height=40&nologo=true'},
    {tip:'canavar', isim:'Lav Balinası', emoji:'🐋', atk:2500, def:2300, resim:'https://image.pollinations.ai/prompt/anime%20lava%20whale%20fire%20ocean%20magma%20beast%202d%20art?width=70&height=40&nologo=true'},
    {tip:'canavar', isim:'Kristal Aslan', emoji:'🦁', atk:2300, def:2100, resim:'https://image.pollinations.ai/prompt/anime%20crystal%20lion%20diamond%20shining%20beast%202d%20art?width=70&height=40&nologo=true'},
    {tip:'canavar', isim:'Zehirli Yılan', emoji:'🐍', atk:1500, def:1100, resim:'https://image.pollinations.ai/prompt/anime%20poison%20snake%20green%20venom%20fangs%202d%20art?width=70&height=40&nologo=true'},
    {tip:'canavar', isim:'Mecha Robot', emoji:'🤖', atk:2600, def:2200, resim:'https://image.pollinations.ai/prompt/anime%20mecha%20robot%20futuristic%20laser%20steel%202d%20art?width=70&height=40&nologo=true'},
    {tip:'canavar', isim:'Vampir Lord', emoji:'🧛', atk:2700, def:1900, resim:'https://image.pollinations.ai/prompt/anime%20vampire%20lord%20red%20cape%20blood%20moon%202d%20art?width=70&height=40&nologo=true'},
    {tip:'canavar', isim:'Kutsal Melek', emoji:'👼', atk:2000, def:2500, resim:'https://image.pollinations.ai/prompt/anime%20holy%20angel%20white%20wings%20divine%20light%202d%20art?width=70&height=40&nologo=true'},
    {tip:'duvar', isim:'Buz Duvarı', emoji:'🧊', atk:500, def:2800, resim:'https://image.pollinations.ai/prompt/anime%20ice%20wall%20frozen%20shield%20crystal%20barrier%202d%20art?width=70&height=40&nologo=true'},
    {tip:'duvar', isim:'Ateş Kalkanı', emoji:'🛡️', atk:800, def:2600, resim:'https://image.pollinations.ai/prompt/anime%20fire%20shield%20flame%20barrier%20protection%202d%20art?width=70&height=40&nologo=true'},
    {tip:'duvar', isim:'Taş Sur', emoji:'🧱', atk:1000, def:3000, resim:'https://image.pollinations.ai/prompt/anime%20stone%20castle%20wall%20fortress%20medieval%202d%20art?width=70&height=40&nologo=true'},
    {tip:'duvar', isim:'Büyü Bariyeri', emoji:'🔮', atk:700, def:2700, resim:'https://image.pollinations.ai/prompt/anime%20magic%20barrier%20purple%20crystal%20ball%20energy%202d%20art?width=70&height=40&nologo=true'},
    {tip:'duvar', isim:'Çelik Kapı', emoji:'🚪', atk:900, def:2900, resim:'https://image.pollinations.ai/prompt/anime%20steel%20gate%20iron%20door%20metal%20strong%202d%20art?width=70&height=40&nologo=true'},
    {tip:'duvar', isim:'Elmas Kubbe', emoji:'💎', atk:600, def:3200, resim:'https://image.pollinations.ai/prompt/anime%20diamond%20dome%20crystal%20shield%20invincible%202d%20art?width=70&height=40&nologo=true'},
    {tip:'mistik', isim:'Can Çalma', emoji:'💀', atk:0, def:0, etki:'cancal', resim:'https://image.pollinations.ai/prompt/anime%20skull%20life%20drain%20dark%20magic%20purple%202d%20art?width=70&height=40&nologo=true'},
    {tip:'mistik', isim:'Güç Artışı', emoji:'💪', atk:1000, def:500, etki:'buff', resim:'https://image.pollinations.ai/prompt/anime%20power%20up%20aura%20muscle%20energy%20boost%202d%20art?width=70&height=40&nologo=true'},
    {tip:'mistik', isim:'Kart İmha', emoji:'💥', atk:0, def:0, etki:'yoket', resim:'https://image.pollinations.ai/prompt/anime%20explosion%20card%20destroy%20boom%20effect%202d%20art?width=70&height=40&nologo=true'},
    {tip:'mistik', isim:'Zaman Durdur', emoji:'⏱️', atk:0, def:0, etki:'ekstra', resim:'https://image.pollinations.ai/prompt/anime%20time%20stop%20clock%20freeze%20hourglass%202d%20art?width=70&height=40&nologo=true'},
    {tip:'mistik', isim:'Işınlanma', emoji:'✨', atk:0, def:0, etki:'cek', resim:'https://image.pollinations.ai/prompt/anime%20teleport%20portal%20sparkle%20magic%20warp%202d%20art?width=70&height=40&nologo=true'},
    {tip:'mistik', isim:'Savunma Artışı', emoji:'🛡️', atk:500, def:1000, etki:'buffdef', resim:'https://image.pollinations.ai/prompt/anime%20defense%20up%20shield%20barrier%20blue%20glow%202d%20art?width=70&height=40&nologo=true'},
];
let seninEl = [], seninDeste = [], rakipDeste = [];
let kullanilanKartlar = new Set();
let seninOnSira = [null, null, null], rakipOnSira = [null, null, null];
let seninSavasKarti = null, rakipSavasKarti = null;
let seninCan = 8000, rakipCan = 8000, sure = 60;
let oyunBitti = false, secilenKart = null, secilenIndex = -1;
let oyunTimer = null, ekstraHamle = false, yokedModu = false;
let rakipHamleYapti = false;
function mesajGoster(txt) {
    const m = document.getElementById('mesaj');
    m.textContent = txt;
    m.style.display = 'block';
    setTimeout(() => m.style.display = 'none', 1500);
}
function efektGoster(txt, tip = 'hasar') {
    const e = document.getElementById('efekt');
    e.textContent = txt;
    e.className = tip === 'hasar'? 'hasarYazisi' : 'iyilesYazisi';
    e.style.display = 'block';
    setTimeout(() => e.style.display = 'none', 1000);
}
function sureReset() {
    sure = 60;
    document.getElementById('sure').textContent = sure;
}
function benzersizKartCek() {
    let uygun = KART_HAVUZU.filter(k =>!kullanilanKartlar.has(k.isim));
    if (uygun.length === 0) return null;
    let kart = {...uygun[Math.floor(Math.random() * uygun.length)], id: Math.random()};
    kullanilanKartlar.add(kart.isim);
    return kart;
}
function kartHTML(kart, tip = 'acik') {
    if (tip === 'kapali' || kart.kapali) return `<div class="kart kapali" data-id="${kart.id}"></div>`;
    let buffClass = kart.bufflu? ' buff' : '';
    let efsaneClass = kart.efsanevi? ' efsanevi' : '';
    let resimHTML = kart.resim? `<img src="${kart.resim}" class="kartResim" alt="${kart.isim}" onerror="this.style.display='none'">` : '';
    let statHTML = kart.tip === 'mistik'? '' : `<div class="kartStats"><span class="atk">⚔${kart.atk}</span><span class="def">🛡${kart.def}</span></div>`;
    return `<div class="kart ${kart.tip}${buffClass}${efsaneClass}" data-id="${kart.id}">${resimHTML}<div class="kartIsim">${kart.isim}</div><div class="kartEmoji">${kart.emoji}</div><div class="tip">${kart.tip.toUpperCase()}</div>${statHTML}</div>`;
}
function eliGuncelle() {
    const elDiv = document.getElementById('el');
    elDiv.innerHTML = '';
    seninEl.forEach((kart, i) => {
        let div = document.createElement('div');
        div.innerHTML = kartHTML(kart);
        let kartEl = div.firstElementChild;
        kartEl.classList.add('elKarti');
        if (i === secilenIndex) kartEl.classList.add('secili');
        kartEl.addEventListener('click', () => kartSec(i));
        elDiv.appendChild(kartEl);
    });
}
function kartSec(index) {
    if (oyunBitti || yokedModu) return;
    if (secilenIndex === index) {
        secilenKart = null;
        secilenIndex = -1;
        hedefleriKaldir();
    } else {
        secilenKart = seninEl[index];
        secilenIndex = index;
        if (secilenKart.tip === 'mistik') {
            mistikKullan(secilenKart);
        } else {
            hedefleriGoster();
            mesajGoster('Hedef seç: Ön Sıra veya Savaş Alanı');
        }
    }
    eliGuncelle();
}
function mistikKullan(kart) {
    switch(kart.etki) {
        case 'cancal':
            let calinan = Math.min(1000, rakipCan);
            rakipCan -= calinan;
            seninCan = Math.min(8000, seninCan + calinan);
            efektGoster('+' + calinan, 'iyiles');
            mesajGoster('Can Çalma! +' + calinan + ' LP');
            kartKullan();
            sureReset();
            rakipHamle();
            break;
        case 'buff':
            if (!seninSavasKarti) {
                mesajGoster('Savaş alanında kart yok!');
                return;
            }
            seninSavasKarti.atk += 1000;
            seninSavasKarti.bufflu = true;
            efektGoster('+1000 ATK', 'iyiles');
            mesajGoster('Güç Artışı! +1000 ATK');
            kartKullan();
            sureReset();
            rakipHamle();
            break;
        case 'buffdef':
            if (!seninSavasKarti) {
                mesajGoster('Savaş alanında kart yok!');
                return;
            }
            seninSavasKarti.def += 1000;
            seninSavasKarti.atk += 500;
            seninSavasKarti.bufflu = true;
            efektGoster('+500 ATK +1000 DEF', 'iyiles');
            mesajGoster('Savunma Artışı!');
            kartKullan();
            sureReset();
            rakipHamle();
            break;
        case 'yoket':
            if (!rakipSavasKarti && rakipOnSira.every(k => k === null)) {
                mesajGoster('Yok edilecek kart yok!');
                return;
            }
            yokedModu = true;
            hedefleriKaldir();
            mesajGoster('Yok edilecek rakip kartı seç');
            rakipHedefleriGoster();
            break;
        case 'ekstra':
            ekstraHamle = true;
            efektGoster('+1 HAMLE', 'iyiles');
            mesajGoster('Zaman Durdur! Ekstra hamle');
            kartKullan();
            sureReset();
            break;
        case 'cek':
            kartCek();
            kartCek();
            efektGoster('+2 KART', 'iyiles');
            mesajGoster('Işınlanma! 2 kart çek');
            kartKullan();
            sureReset();
            rakipHamle();
            break;
    }
}
function kartKullan() {
    seninEl.splice(secilenIndex, 1);
    secilenKart = null;
    secilenIndex = -1;
    hedefleriKaldir();
    eliGuncelle();
    sahayiGuncelle();
    guncelleLP();
}
function rakipHedefleriGoster() {
    if (rakipSavasKarti) {
        document.getElementById('rakipSavas').classList.add('yoked');
        document.getElementById('rakipSavas').onclick = () => rakipKartYokEt('savas');
    }
    document.querySelectorAll('[data-tip="ro"]').forEach((slot, i) => {
        if (rakipOnSira[i]) {
            slot.classList.add('yoked');
            slot.onclick = () => rakipKartYokEt('on', i);
        }
    });
}
function rakipKartYokEt(tip, index) {
    if (tip === 'savas') {
        rakipSavasKarti = null;
    } else {
        rakipOnSira[index] = null;
    }
    yokedModu = false;
    document.querySelectorAll('.yoked').forEach(el => {
        el.classList.remove('yoked');
        el.onclick = null;
    });
    efektGoster('YOK EDİLDİ!', 'hasar');
    mesajGoster('Kart İmha edildi!');
    kartKullan();
    sureReset();
    rakipHamle();
}
function hedefleriGoster() {
    document.querySelectorAll('[data-tip="so"]').forEach((slot, i) => {
        if (!seninOnSira[i]) slot.classList.add('hedef');
    });
    if (!seninSavasKarti) document.getElementById('seninSavas').classList.add('hedef');
}
function hedefleriKaldir() {
    document.querySelectorAll('.hedef').forEach(el => el.classList.remove('hedef'));
}
document.getElementById('seninOnSira').addEventListener('click', (e) => {
    const slot = e.target.closest('.slot');
    if (!slot) return;
    const index = parseInt(slot.dataset.index);
    if (seninOnSira[index]) {
        kartAc(index);
    } else if (secilenKart &&!yokedModu) {
        slotTikla('so', index);
    }
});
document.getElementById('seninSavas').addEventListener('click', () => {
    if (secilenKart &&!yokedModu) slotTikla('savas', 0);
    else if (seninSavasKarti) {
        if (!rakipSavasKarti && rakipOnSira.every(k => k === null)) {
            direkSaldiri();
        } else {
            mesajGoster('Hedef seç: Rakip kartına tıkla!');
        }
    }
});
document.getElementById('rakipSavas').addEventListener('click', () => {
    if (seninSavasKarti && rakipSavasKarti &&!yokedModu) {
        savasYap();
    }
});
document.getElementById('rakipOnSira').addEventListener('click', (e) => {
    const slot = e.target.closest('.slot');
    if (!slot ||!seninSavasKarti || yokedModu) return;
    const index = parseInt(slot.dataset.index);
    if (rakipOnSira[index] &&!rakipSavasKarti) {
        rakipSavasKarti = {...rakipOnSira[index], kapali: false};
        rakipOnSira[index] = null;
        sahayiGuncelle();
        mesajGoster('Rakip kart açıldı!');
        setTimeout(savasYap, 500);
    }
});
function slotTikla(tip, index) {
    if (!secilenKart || oyunBitti || yokedModu) return;
    if (tip === 'so' &&!seninOnSira[index]) {
        seninOnSira[index] = {...secilenKart, kapali: true};
        seninEl.splice(secilenIndex, 1);
        mesajGoster('Kapalı kart konuldu');
        kartBirak();
        sureReset();
        rakipHamle();
    } else if (tip === 'savas' &&!seninSavasKarti) {
        seninSavasKarti = {...secilenKart, kapali: false};
        seninEl.splice(secilenIndex, 1);
        mesajGoster('Savaş alanına sürüldü');
        kartBirak();
        sureReset();
        if (rakipSavasKarti) setTimeout(savasYap, 500);
        else rakipHamle();
    }
}
function kartBirak() {
    secilenKart = null;
    secilenIndex = -1;
    hedefleriKaldir();
    eliGuncelle();
    sahayiGuncelle();
}
function kartAc(index) {
    if (!seninOnSira[index] || seninSavasKarti) return;
    seninSavasKarti = {...seninOnSira[index], kapali: false};
    seninOnSira[index] = null;
    sahayiGuncelle();
    mesajGoster('Kart açıldı');
    sureReset();
    if (rakipSavasKarti) setTimeout(savasYap, 500);
    else rakipHamle();
}
function sahayiGuncelle() {
    document.querySelectorAll('[data-tip="so"]').forEach((slot, i) => {
        if (seninOnSira[i]) {
            slot.innerHTML = kartHTML(seninOnSira[i], 'kapali');
            slot.classList.add('dolu');
        } else {
            slot.innerHTML = 'BOŞ';
            slot.classList.remove('dolu');
        }
    });
    document.querySelectorAll('[data-tip="ro"]').forEach((slot, i) => {
        if (rakipOnSira[i]) {
            slot.innerHTML = kartHTML(rakipOnSira[i], 'kapali');
            slot.classList.add('dolu');
        } else {
            slot.innerHTML = 'RAKİP';
            slot.classList.remove('dolu');
        }
    });
    document.getElementById('seninSavas').innerHTML = seninSavasKarti? kartHTML(seninSavasKarti) : 'BOŞ';
        document.getElementById('seninSavas').innerHTML = seninSavasKarti? kartHTML(seninSavasKarti) : 'BOŞ';
    document.getElementById('seninSavas').classList.toggle('dolu',!!seninSavasKarti);
    document.getElementById('rakipSavas').innerHTML = rakipSavasKarti? kartHTML(rakipSavasKarti) : 'RAKİP';
    document.getElementById('rakipSavas').classList.toggle('dolu',!!rakipSavasKarti);
    if (seninSavasKarti &&!rakipSavasKarti && rakipOnSira.every(k => k === null)) {
        document.getElementById('rakipSavas').classList.add('saldiri');
    } else {
        document.getElementById('rakipSavas').classList.remove('saldiri');
    }
}
function direkSaldiri() {
    if (!seninSavasKarti || oyunBitti) return;
    if (rakipSavasKarti || rakipOnSira.some(k => k!== null)) {
        mesajGoster('Rakip canavarları yok etmelisin!');
        return;
    }
    mesajGoster('DİREKT SALDIRI!');
    let hasar = seninSavasKarti.atk;
    rakipCan -= hasar;
    efektGoster('-' + hasar, 'hasar');
    guncelleLP();
    kontrolEt();
    sureReset();
    rakipHamle();
}
function kartCek() {
    if (oyunBitti || seninDeste.length === 0 || seninEl.length >= 7) return;
    let kart = seninDeste.pop();
    if (kart) {
        seninEl.push(kart);
        document.getElementById('desteSayi').textContent = seninDeste.length;
        eliGuncelle();
        if (!ekstraHamle) {
            mesajGoster('Kart çekildi');
            sureReset();
            rakipHamle();
        }
    }
}
function savasYap() {
    if (!seninSavasKarti ||!rakipSavasKarti || oyunBitti) return;
    mesajGoster('KAPIŞMA!');
    let seninKart = seninSavasKarti;
    let rakipKart = rakipSavasKarti;
    document.querySelector('#seninSavas.kart')?.classList.add('saldiri');
    document.querySelector('#rakipSavas.kart')?.classList.add('saldiri');
    setTimeout(() => {
        if (seninKart.atk > rakipKart.def) {
            let fark = seninKart.atk - rakipKart.def;
            rakipCan -= fark;
            rakipSavasKarti = null;
            efektGoster('-' + fark, 'hasar');
            mesajGoster('Rakip canavar yok edildi! -' + fark + ' LP');
        } else if (seninKart.atk < rakipKart.def) {
            let fark = rakipKart.def - seninKart.atk;
            seninCan -= fark;
            seninSavasKarti = null;
            efektGoster('-' + fark, 'hasar');
            mesajGoster('Saldırı başarısız! -' + fark + ' LP');
        } else {
            seninSavasKarti = null;
            rakipSavasKarti = null;
            mesajGoster('Berabere! İki canavar da yok oldu');
        }
        guncelleLP();
        sahayiGuncelle();
        kontrolEt();
        if (!oyunBitti) rakipHamle();
    }, 600);
}
function rakipHamle() {
    if (oyunBitti || rakipHamleYapti) return;
    rakipHamleYapti = true;
    setTimeout(() => {
        let kartActi = false;
        if (!rakipSavasKarti) {
            let kapaliIndex = rakipOnSira.findIndex(k => k!== null);
            if (kapaliIndex!== -1) {
                rakipSavasKarti = {...rakipOnSira[kapaliIndex], kapali: false};
                rakipOnSira[kapaliIndex] = null;
                mesajGoster('Rakip kart açtı');
                kartActi = true;
            } else {
                let yeniKart = rakipDeste.pop();
                if (yeniKart) {
                    rakipSavasKarti = {...yeniKart, kapali: false};
                    mesajGoster('Rakip savaş alanına kart koydu');
                    kartActi = true;
                }
            }
        } else if (Math.random() > 0.5) {
            let bosIndex = rakipOnSira.findIndex(k => k === null);
            if (bosIndex!== -1) {
                let yeniKart = rakipDeste.pop();
                if (yeniKart) rakipOnSira[bosIndex] = {...yeniKart, kapali: true};
            }
        }
        sahayiGuncelle();
        if (kartActi) {
            mesajGoster('Rakip hamlesini bitirdi');
            rakipHamleYapti = false;
            return;
        }
        let seninSahanBos =!seninSavasKarti && seninOnSira.every(k => k === null);
        if (rakipSavasKarti && seninSahanBos) {
            setTimeout(() => {
                let hasar = rakipSavasKarti.atk;
                seninCan -= hasar;
                efektGoster('-' + hasar, 'hasar');
                mesajGoster('Rakip direkt saldırdı! -' + hasar);
                guncelleLP();
                kontrolEt();
                rakipHamleYapti = false;
            }, 800);
        } else if (seninSavasKarti && rakipSavasKarti) {
            setTimeout(() => {
                savasYap();
                rakipHamleYapti = false;
            }, 800);
        } else {
            rakipHamleYapti = false;
        }
    }, 1000);
}
function guncelleLP() {
    document.getElementById('seninLP').textContent = `SEN: ${Math.max(0, seninCan)}`;
    document.getElementById('rakipLP').textContent = `RAKİP: ${Math.max(0, rakipCan)}`;
}
function kontrolEt() {
    if (seninCan <= 0) oyunBitir(false);
    if (rakipCan <= 0) oyunBitir(true);
}
function oyunBitir(kazandin) {
    oyunBitti = true;
    clearInterval(oyunTimer);
    document.getElementById('bitisEkrani').style.display = 'flex';
    document.getElementById('sonucText').textContent = kazandin? 'KAZANDIN!' : 'KAYBETTİN';
    document.getElementById('odulText').textContent = kazandin? '+500 COIN' : 'Reklam izle devam et';
}
function baslat() {
    kullanilanKartlar.clear();
    seninDeste = [];
    rakipDeste = [];
    let tumKartlar = [];
    for (let i = 0; i < 21; i++) {
        let k = benzersizKartCek();
        if (k) tumKartlar.push(k);
    }
    tumKartlar.sort(() => Math.random() - 0.5);
    for (let i = 0; i < tumKartlar.length; i++) {
        if (i % 2 === 0) seninDeste.push(tumKartlar[i]);
        else rakipDeste.push(tumKartlar[i]);
    }
    let acarIndex = rakipDeste.findIndex(k => k.isim === 'ACAR');
    if (acarIndex!== -1) {
        let acar = rakipDeste.splice(acarIndex, 1)[0];
        seninDeste.push(acar);
    } else if (!seninDeste.some(k => k.isim === 'ACAR')) {
        let acar = KART_HAVUZU.find(k => k.isim === 'ACAR');
        seninDeste.push({...acar, id: Math.random()});
    }
    seninEl = [];
    let acarElIndex = seninDeste.findIndex(k => k.isim === 'ACAR');
    if (acarElIndex!== -1) {
        seninEl.push(seninDeste.splice(acarElIndex, 1)[0]);
    }
    for (let i = 0; i < 4; i++) {
        if (seninDeste.length > 0) seninEl.push(seninDeste.pop());
    }
    seninOnSira = [null, null, null];
    rakipOnSira = [null, null, null];
    seninSavasKarti = null;
    rakipSavasKarti = null;
    secilenKart = null;
    secilenIndex = -1;
    ekstraHamle = false;
    yokedModu = false;
    rakipHamleYapti = false;
    seninCan = 8000; rakipCan = 8000; sure = 60; oyunBitti = false;
    document.getElementById('desteSayi').textContent = seninDeste.length;
    document.getElementById('bitisEkrani').style.display = 'none';
    eliGuncelle();
    sahayiGuncelle();
    guncelleLP();
    clearInterval(oyunTimer);
    oyunTimer = setInterval(() => {
        if (oyunBitti) {
            clearInterval(oyunTimer);
            return;
        }
        sure--;
        document.getElementById('sure').textContent = sure;
        if (sure <= 0) oyunBitir(seninCan > rakipCan);
    }, 1000);
    document.getElementById('deste').onclick = () => {
        kartCek();
        sureReset();
        if (!ekstraHamle) rakipHamle();
    };
    setTimeout(rakipHamle, 1000);
}
baslat();
</script>
