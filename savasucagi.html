<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Striker V8.4 - TEMPEST</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
body { margin:0; background:#000; overflow:hidden; color:#fff; font-family:'Orbitron',sans-serif; touch-action:none; }
canvas { display:block; }
#ui { position:absolute; top:10px; left:10px; pointer-events:none; z-index:10; }
.stat { font-size:18px; margin-bottom:6px; text-transform:uppercase; letter-spacing:2px; font-weight:900; }
#score-stat { color:#00f0ff; text-shadow:0 0 15px #00f0ff, 0 0 30px #00f0ff; }
#lives-stat { color:#ff0055; text-shadow:0 0 15px #ff0055, 0 0 30px #ff0055; }
#high-stat { color:#ffaa00; text-shadow:0 0 15px #ffaa00, 0 0 30px #ffaa00; }
#coin-stat { color:#ffff00; text-shadow:0 0 15px #ffff00, 0 0 30px #ffff00; }
#overlay { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.95); z-index:20; }
button { padding:15px 30px; font-size:18px; background:#00f0ff; border:none; border-radius:5px; font-weight:bold; cursor:pointer; color:#000; box-shadow:0 0 20px #00f0ff; margin:5px; font-family:'Orbitron',sans-serif; }
#bossHp { position:absolute; top:10px; left:50%; transform:translateX(-50%); width:300px; height:20px; background:#333; border:2px solid #ff0055; display:none; z-index:10; }
#bossHpFill { height:100%; background:linear-gradient(90deg, #ff0055, #ff8800); width:100%; transition:width 0.3s; }
#bossName { position:absolute; top:35px; left:50%; transform:translateX(-50%); color:#ff0055; font-weight:900; display:none; z-index:10; text-shadow:0 0 10px #ff0055; font-family:'Orbitron',sans-serif; }
#pauseMenu { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.95); z-index:25; }
/* FİX: PAUSE BUTONU DAİRE YOK */
#pauseBtn { position:absolute; top:10px; right:10px; z-index:15; background:transparent; border:none; color:#ff0055; width:50px; height:50px; pointer-events:auto; font-size:32px; font-weight:900; font-family:'Orbitron',sans-serif; display:flex; align-items:center; justify-content:center; padding:0; text-shadow:0 0 15px #ff0055; }
#weaponUI { position:absolute; bottom:140px; left:50%; transform:translateX(-50%); display:none; z-index:10; color:#ff8800; text-shadow:0 0 15px #ff8800; font-weight:900; }
#touchArea { position:absolute; bottom:0; left:0; width:100%; height:130px; z-index:5; pointer-events:auto; background:radial-gradient(ellipse at center bottom, rgba(0,240,255,0.1) 0%, transparent 70%); }
#touchHint { position:absolute; bottom:60px; left:50%; transform:translateX(-50%); color:rgba(0,240,255,0.5); font-size:14px; font-weight:700; letter-spacing:3px; text-shadow:0 0 10px rgba(0,240,255,0.6); pointer-events:none; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity:0.4; } 50% { opacity:0.8; } }
</style>
</head>
<body>
<div id="ui">
    <div class="stat" id="score-stat">SKOR: <span id="score">0</span></div>
    <div class="stat" id="lives-stat">CAN: <span id="lives">1</span></div>
    <div class="stat" id="high-stat">REKOR: <span id="high">0</span></div>
    <div class="stat" id="coin-stat">COIN: <span id="coins">0</span></div>
</div>
<div id="bossHp"><div id="bossHpFill"></div></div>
<div id="bossName">NEON DESTROYER</div>
<button id="pauseBtn" onclick="togglePause()">⏸</button>
<div id="weaponUI" class="stat">MEGA PENTA AKTİF!</div>
<div id="touchArea">
    <!-- FİX: TAP TO MOVE -->
    <div id="touchHint">TAP TO MOVE</div>
</div>
<div id="overlay">
    <h1 style="color:#ff00aa; font-size:40px; text-shadow:0 0 20px #ff00aa, 0 0 40px #00f0ff; font-family:'Orbitron',sans-serif;">HATA AFFETMEZ</h1>
    <h1 style="color:#00f0ff; font-size:50px; text-shadow:0 0 30px #00f0ff, 0 0 60px #ff00aa; font-family:'Orbitron',sans-serif; margin:10px 0;">ACAR GAME</h1>
    <h2 style="color:#ffff00; font-size:30px; text-shadow:0 0 20px #ffff00; font-family:'Orbitron',sans-serif;">KAZANDI!</h2>
    <p id="finalScore" style="font-size:20px; font-family:'Orbitron',sans-serif; margin-top:20px;"></p>
    <p id="finalCombo" style="font-size:18px; color:#ff00ff; font-family:'Orbitron',sans-serif;"></p>
    <p id="finalCoins" style="font-size:18px; color:#ffff00; font-family:'Orbitron',sans-serif;"></p>
    <button onclick="resetGame()">TEKRAR BAŞLA</button>
    <button onclick="shareScore()">SKORU PAYLAŞ</button>
</div>
<div id="pauseMenu">
    <h1 style="color:#00f0ff; font-size:40px; text-shadow:0 0 20px #00f0ff; font-family:'Orbitron',sans-serif;">DURAKLATILDI</h1>
    <button onclick="resumeGame()">DEVAM ET</button>
    <button onclick="resetGame()">YENİ OYUN</button>
    <button onclick="toggleSound()" id="soundBtn">SES: AÇIK</button>
    <button onclick="toggleVibrate()" id="vibrateBtn">TİTREŞİM: AÇIK</button>
</div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const highEl = document.getElementById('high');
const coinsEl = document.getElementById('coins');
const overlay = document.getElementById('overlay');
const pauseMenu = document.getElementById('pauseMenu');
const bossHpBar = document.getElementById('bossHp');
const bossHpFill = document.getElementById('bossHpFill');
const bossName = document.getElementById('bossName');
const weaponUI = document.getElementById('weaponUI');
const soundBtn = document.getElementById('soundBtn');
const vibrateBtn = document.getElementById('vibrateBtn');
const touchArea = document.getElementById('touchArea');

let width, height, player, obstacles, bullets, particles, powerups, stars, enemyBullets;
let score, lives, isGameOver, frameCount, gameSpeed, animationId, boss;
let highScore = localStorage.getItem('neonV7') || 0;
let coins, shake = 0, combo = 0, maxCombo = 0, bossActive = false, paused = false;
let weaponLevel = 0, slowMo = 0, bossLevel = 0;
let soundEnabled = localStorage.getItem('neonSound')!== 'false';
let vibrateEnabled = localStorage.getItem('neonVibrate')!== 'false';
// FİX: ATEŞ KONTROLÜ
let isTouching = false;

const GALAXY_COLORS = [
    'rgba(0, 0, 0, 0.7)',
    'rgba(20, 0, 40, 0.7)',
    'rgba(0, 20, 40, 0.7)',
    'rgba(40, 0, 20, 0.7)',
    'rgba(0, 40, 20, 0.7)',
];
let currentGalaxy = 0;

let audioCtx;
function playSound(freq, duration, type='sine', vol=0.1) {
    if(!soundEnabled) return;
    try {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = freq; osc.type = type;
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}

function doVibrate(pattern) {
    if(vibrateEnabled && navigator.vibrate) navigator.vibrate(pattern);
}

let FIRE_RATE = 6, BULLET_COUNT = 5, BULLET_SPREAD = 18;

const RAINBOW_COLORS = ['#ff00aa', '#00f0ff', '#ffff00', '#00ff00', '#ff0055', '#aa00ff', '#ff8800'];

function drawAircraft(ctx, type, x, y, size, h, color, angle=0) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);

    if(type === 'tempest') {
        ctx.beginPath();
        ctx.moveTo(0, -h);
        ctx.lineTo(size*0.65, -h*0.25);
        ctx.lineTo(size*0.95, h*0.2);
        ctx.lineTo(size*0.45, h*0.45);
        ctx.lineTo(size*0.2, h*0.8);
        ctx.lineTo(0, h*0.6);
        ctx.lineTo(-size*0.2, h*0.8);
        ctx.lineTo(-size*0.45, h*0.45);
        ctx.lineTo(-size*0.95, h*0.2);
        ctx.lineTo(-size*0.65, -h*0.25);
        ctx.closePath();

        ctx.fillStyle = '#00f0ff';
        ctx.shadowBlur = 15; ctx.shadowColor = '#00f0ff';
        ctx.fill();

        ctx.strokeStyle = '#ff00aa';
        ctx.lineWidth = 3;
        ctx.shadowColor = '#ff00aa';
        ctx.stroke();

        ctx.fillStyle = '#001133';
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.ellipse(0, -h*0.3, size*0.12, h*0.25, 0, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = '#333333';
        ctx.shadowBlur = 5;
        ctx.beginPath();
        ctx.arc(-size*0.2, h*0.6, size*0.08, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(size*0.2, h*0.6, size*0.08, 0, Math.PI*2);
        ctx.fill();
    }
    ctx.restore();
}

function drawLaserBeam(ctx, x, y, length, color) {
    ctx.save();
    ctx.translate(x, y);

    ctx.shadowBlur = 15; ctx.shadowColor = color;
    ctx.fillStyle = color;
    ctx.fillRect(-1.5, -length/2, 3, length);

    ctx.shadowBlur = 8; ctx.shadowColor = '#ffffff';
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(-0.5, -length/2, 1, length);

    ctx.restore();
}

function createHitEffect(x, y) {
    particles.push({
        x, y, vx: 0, vy: 0, life: 0.5, color: '#00f0ff', size: 5, type: 'ring'
    });
    particles.push({
        x, y, vx: 0, vy: 0, life: 0.4, color: '#ff00aa', size: 15, type: 'ring'
    });
    playSound(900, 0.1, 'square', 0.15);
}

function init() {
    if (animationId) cancelAnimationFrame(animationId);
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    score = 0; lives = 1; coins = 0; isGameOver = false; paused = false;
    obstacles = []; bullets = []; particles = []; powerups = []; enemyBullets = [];
    frameCount = 0; gameSpeed = 4; combo = 0; maxCombo = 0; bossActive = false;
    weaponLevel = 0; slowMo = 0; bossLevel = 0;
    isTouching = false;

    stars = [];
    for(let i=0; i<80; i++) {
        stars.push({x: Math.random()*width, y: Math.random()*height, size: Math.random()*2, speed: Math.random()*3+1});
    }

    player = {x: width/2, y: height-140, size:38, height:30, targetX: width/2, color: '#00f0ff', invincible: 0, model:'tempest'};

    scoreEl.textContent = score; livesEl.textContent = lives;
    highEl.textContent = highScore; coinsEl.textContent = coins;
    overlay.style.display = 'none'; pauseMenu.style.display = 'none';
    bossHpBar.style.display = 'none'; bossName.style.display = 'none';
    soundBtn.textContent = 'SES: ' + (soundEnabled? 'AÇIK' : 'KAPALI');
    vibrateBtn.textContent = 'TİTREŞİM: ' + (vibrateEnabled? 'AÇIK' : 'KAPALI');
    updateWeaponUI();
    animate();
}

function updateWeaponUI() {
    if(weaponLevel >= 2) {
        BULLET_COUNT = 7; BULLET_SPREAD = 15;
    } else if(weaponLevel >= 1) {
        BULLET_COUNT = 6; BULLET_SPREAD = 16;
    } else {
        BULLET_COUNT = 5; BULLET_SPREAD = 18;
    }
}

const updatePos = (e) => {
    if(paused) return;
    const x = e.touches? e.touches[0].clientX : e.clientX;
    player.targetX = x;
};

// FİX: DOKUNMATİK ATEŞ KONTROLÜ
touchArea.addEventListener('touchstart', (e) => {
    e.preventDefault();
    isTouching = true;
    updatePos(e);
}, { passive: false });

touchArea.addEventListener('touchmove', (e) => {
    e.preventDefault();
    updatePos(e);
}, { passive: false });

touchArea.addEventListener('touchend', (e) => {
    e.preventDefault();
    isTouching = false;
}, { passive: false });

window.addEventListener('mousemove', updatePos);

function spawnObstacle() {
    if(bossActive) return;
    const size = Math.random() * 40 + 30;
    const rand = Math.random();
    let type = 'normal', hp = 1, color = `hsl(${Math.random() * 360}, 80%, 60%)`;
    if(rand > 0.99) { type = 'weapon'; hp = 2; color = '#ff8800'; }
    else if(rand > 0.95) { type = 'coin'; hp = 1; color = '#ffff00'; }
    else if(rand > 0.80) { hp = 3; color = '#ffffff'; }

    obstacles.push({x: Math.random()*(width-size), y: -size, size: size, speed: gameSpeed+Math.random()*2, color, hp, type, maxHp: hp});
}

function spawnBoss() {
    bossActive = true;
    bossLevel++;
    const bossTypes = [
        {name: 'NEON DESTROYER', hp: 150, color: '#ff0055', speed: 2},
        {name: 'VOID REAPER', hp: 250, color: '#8800ff', speed: 3},
        {name: 'OMEGA CORE', hp: 400, color: '#ff8800', speed: 1.5},
        {name: 'TITAN ALPHA', hp: 600, color: '#ff00aa', speed: 2.5},
        {name: 'NIGHTMARE', hp: 900, color: '#aa00ff', speed: 2}
    ];
    const b = bossTypes[Math.min(bossLevel-1, 4)];
    boss = {x: width/2, y: 120, size: 140, hp: b.hp, maxHp: b.hp, color: b.color, speed: b.speed, dir: 1, fireRate: 0, name: b.name, bulletCount: 1 + (bossLevel-1)*2};
    bossHpBar.style.display = 'block'; bossName.style.display = 'block'; bossName.textContent = b.name + ' LVL' + bossLevel;
    playSound(80, 1, 'sawtooth', 0.2);
}

function createExplosion(x, y, color, big=false) {
    shake = big? 25 : 12;
    const count = big? 15 : 8;
    for(let i=0; i<count; i++) {
        particles.push({
            x, y, vx: (Math.random()-0.5)*(big?20:14), vy: (Math.random()-0.5)*(big?20:14),
            life: 1.0, color, size: big?10:6, type: Math.random() > 0.5? 'circle' : 'square'
        });
    }
    playSound(big?120:350, big?0.3:0.1, 'square', big?0.2:0.1);
    doVibrate(big?150:50);
}

function spawnPowerup(x, y, type) {
    const colors = {weapon: '#ff8800', coin: '#ffff00', slowmo: '#00ffff'};
    powerups.push({x, y, type, size: 25, color: colors[type], angle: 0});
}

function togglePause() {
    if(isGameOver) return;
    paused =!paused;
    if(paused) {
        pauseMenu.style.display = 'flex';
        cancelAnimationFrame(animationId);
    } else {
        resumeGame();
    }
}

function resumeGame() {
    paused = false;
    pauseMenu.style.display = 'none';
    if(!isGameOver) animate();
}

function toggleSound() {
    soundEnabled =!soundEnabled;
    localStorage.setItem('neonSound', soundEnabled);
    soundBtn.textContent = 'SES: ' + (soundEnabled? 'AÇIK' : 'KAPALI');
    playSound(500, 0.1);
}

function toggleVibrate() {
    vibrateEnabled =!vibrateEnabled;
    localStorage.setItem('neonVibrate', vibrateEnabled);
    vibrateBtn.textContent = 'TİTREŞİM: ' + (vibrateEnabled? 'AÇIK' : 'KAPALI');
    doVibrate(50);
}

function drawBossBullet(b) {
    ctx.shadowBlur = 20;
    ctx.shadowColor = b.glowColor;
    ctx.fillStyle = b.glowColor;
    ctx.beginPath();
    ctx.arc(b.x, b.y, 10, 0, Math.PI*2);
    ctx.fill();

    ctx.shadowBlur = 10;
    ctx.shadowColor = b.color;
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.arc(b.x, b.y, 5, 0, Math.PI*2);
    ctx.fill();

    if(b.hp < 5) {
        ctx.fillStyle = '#ff0000';
        ctx.fillRect(b.x-8, b.y-15, 16, 3);
        ctx.fillStyle = '#00ff00';
        ctx.fillRect(b.x-8, b.y-15, 16*(b.hp/5), 3);
    }
}

function animate() {
    if (isGameOver || paused) return;
    animationId = requestAnimationFrame(animate);

    const timeScale = slowMo > 0? 0.5 : 1;
    if(slowMo > 0) slowMo--;

    ctx.save();
    if (shake > 0) {
        ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2);
        shake *= 0.9;
    }

    ctx.fillStyle = GALAXY_COLORS[currentGalaxy];
    ctx.fillRect(0, 0, width, height);

    stars.forEach(s => {
        s.y += s.speed * timeScale;
        if(s.y > height) { s.y = 0; s.x = Math.random()*width; }
        ctx.fillStyle = `rgba(255,255,${s.size/2})`;
        ctx.fillRect(s.x, s.y, s.size, s.size);
    });

    player.x += (player.targetX - player.x) * 0.35;
    if(player.x < player.size) player.x = player.size;
    if(player.x > width - player.size) player.x = width - player.size;
    if(player.invincible > 0) player.invincible--;

    ctx.save();
    if(player.invincible > 0 && Math.floor(frameCount/5) % 2 === 0) ctx.globalAlpha = 0.3;
    drawAircraft(ctx, player.model, player.x, player.y, player.size, player.height, player.color);
    ctx.restore();

    // FİX: SADECE DOKUNCA ATEŞ
    const currentFireRate = Math.max(4, FIRE_RATE - Math.floor(gameSpeed/3));
    if (isTouching && frameCount % currentFireRate === 0) {
        for(let i = 0; i < BULLET_COUNT; i++) {
            const offset = (i - Math.floor(BULLET_COUNT/2)) * BULLET_SPREAD;
            const bulletColor = RAINBOW_COLORS[i % RAINBOW_COLORS.length];
            bullets.push({x: player.x+offset, y: player.y-player.height, color: bulletColor, dmg: 1, size: 6});
        }
        playSound(weaponLevel >= 2? 1000 : 800, 0.05, 'square');
    }

    for(let i = bullets.length-1; i >= 0; i--) {
        const b = bullets[i];
        b.y -= 12 * timeScale;

        drawLaserBeam(ctx, b.x, b.y, 25, b.color);

        if(b.y < 0) bullets.splice(i, 1);
    }

    if(bossActive && boss) {
        boss.x += boss.speed * boss.dir * timeScale;
        if(boss.x < boss.size || boss.x > width-boss.size) boss.dir *= -1;
        boss.fireRate++;

        if(boss.fireRate % 60 === 0) {
            const bulletColors = [
                {core: '#00ffff', glow: '#ff00ff'},
                {core: '#ff00ff', glow: '#00ffff'}
            ];
            const spread = 0.15 * boss.bulletCount;
            for(let i = 0; i < boss.bulletCount; i++) {
                const angle = (i - (boss.bulletCount-1)/2) * (spread / boss.bulletCount);
                const colorSet = bulletColors[i % 2];
                enemyBullets.push({
                    x: boss.x,
                    y: boss.y+boss.size/2,
                    vx: Math.sin(angle)*4,
                    vy: 6,
                    color: colorSet.core,
                    glowColor: colorSet.glow,
                    hp: 5
                });
            }
            playSound(200, 0.1, 'sawtooth');
        }

        ctx.save();
        ctx.translate(boss.x, boss.y);
        ctx.shadowBlur = 40; ctx.shadowColor = boss.color; ctx.fillStyle = '#1a0000';
        ctx.strokeStyle = boss.color; ctx.lineWidth = 4;

        ctx.beginPath();
        for(let i = 0; i < 6; i++) {
            const angle = (Math.PI / 3) * i - Math.PI/2;
            const x = Math.cos(angle) * boss.size/2;
            const y = Math.sin(angle) * boss.size/2;
            if(i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill(); ctx.stroke();

        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 20; ctx.shadowColor = '#ffffff';
        ctx.beginPath();
        ctx.arc(0, 0, 15, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = '#ff0000';
        ctx.beginPath();
        ctx.arc(-20, -15, 8, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(20, -15, 8, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();

        bossHpFill.style.width = (boss.hp/boss.maxHp*100) + '%';

        for(let bi = bullets.length-1; bi >= 0; bi--) {
            const b = bullets[bi];
            if(Math.abs(b.x-boss.x) < boss.size/2 && Math.abs(b.y-boss.y) < boss.size/2) {
                bullets.splice(bi, 1);
                boss.hp -= b.dmg * (weaponLevel + 1);
                createHitEffect(b.x, b.y);
                createExplosion(b.x, b.y, '#ff0055');
                if(boss.hp <= 0) {
                    createExplosion(boss.x, boss.y, boss.color, true);
                    bossActive = false; boss = null;
                    bossHpBar.style.display = 'none'; bossName.style.display = 'none';
                    score += 1000; coins += 50; coinsEl.textContent = coins;
                    scoreEl.textContent = score;
                    playSound(40, 1.5, 'sawtooth', 0.3);
                    slowMo = 60;
                    currentGalaxy = (currentGalaxy + 1) % GALAXY_COLORS.length;
                }
            }
        }
    }

    for(let i = enemyBullets.length-1; i >= 0; i--) {
        const b = enemyBullets[i];
        b.x += b.vx * timeScale; b.y += b.vy * timeScale;
        drawBossBullet(b);

        for(let bi = bullets.length-1; bi >= 0; bi--) {
            const pb = bullets[bi];
            if(Math.abs(pb.x-b.x) < 12 && Math.abs(pb.y-b.y) < 20) {
                bullets.splice(bi, 1);
                b.hp--;
                createHitEffect(b.x, b.y);
                if(b.hp <= 0) {
                    createExplosion(b.x, b.y, b.color);
                    enemyBullets.splice(i, 1);
                    score += 5;
                    scoreEl.textContent = score;
                }
                break;
            }
        }

        if(player.invincible === 0 && Math.abs(player.x-b.x) < player.size*0.8 && Math.abs(player.y-b.y) < 25) {
            enemyBullets.splice(i, 1);
            lives--; livesEl.textContent = lives; combo = 0;
            createExplosion(player.x, player.y, '#ff0000');
            player.invincible = 60;
            if(lives <= 0) endGame();
        }
        if(b.y > height || b.x < 0 || b.x > width) enemyBullets.splice(i, 1);
    }

    if (frameCount % 25 === 0) spawnObstacle();
    if (score >= 2000 &&!bossActive && frameCount % 1000 === 0) spawnBoss();

    for(let i = obstacles.length-1; i >= 0; i--) {
        const o = obstacles[i]; o.y += o.speed * timeScale;
        ctx.shadowBlur = 12; ctx.shadowColor = o.color; ctx.fillStyle = o.color;
        if(o.hp > 1) {
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 3;
            ctx.strokeRect(o.x, o.y, o.size, o.size);
            ctx.fillStyle = '#ff0000'; ctx.fillRect(o.x, o.y-8, o.size, 4);
            ctx.fillStyle = '#00ff00'; ctx.fillRect(o.x, o.y-8, o.size*(o.hp/o.maxHp), 4);
        }
        ctx.fillStyle = o.color; ctx.fillRect(o.x, o.y, o.size, o.size);

        for(let bi = bullets.length-1; bi >= 0; bi--) {
            const b = bullets[bi];
            if(b.x > o.x && b.x < o.x+o.size && b.y > o.y && b.y < o.y+o.size) {
                o.hp -= b.dmg; bullets.splice(bi, 1);
                createHitEffect(b.x, b.y);
                if(o.hp <= 0) {
                    createExplosion(o.x+o.size/2, o.y+o.size/2, o.color);
                    if(o.type === 'weapon') spawnPowerup(o.x+o.size/2, o.y+o.size/2, 'weapon');
                    else if(o.type === 'coin') { coins += 5; coinsEl.textContent = coins; }
                    else if(Math.random() > 0.998) spawnPowerup(o.x+o.size/2, o.y+o.size/2, 'slowmo');
                    obstacles.splice(i, 1);
                    score += 10; combo++;
                    if(combo > maxCombo) maxCombo = combo;
                }
                scoreEl.textContent = score;
                if(score % 400 === 0) gameSpeed = Math.min(gameSpeed + 0.8, 10);
                if(bossActive) gameSpeed = 6;
                break;
            }
        }

        const dx = Math.abs(player.x - (o.x+o.size/2));
        const dy = Math.abs(player.y - (o.y+o.size/2));
        if(player.invincible === 0 && dx < player.size*0.8 && dy < 25) {
            createExplosion(player.x, player.y, '#ff0000');
            obstacles.splice(i, 1);
            lives--; livesEl.textContent = lives;
            player.invincible = 60;
            if(lives <= 0) endGame();
        }
        if(o.y > height) {
            obstacles.splice(i, 1);
            combo = 0;
        }
    }

    for(let i = powerups.length-1; i >= 0; i--) {
        const p = powerups[i]; p.y += 3 * timeScale; p.angle += 0.1;
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle);
        ctx.shadowBlur = 20; ctx.shadowColor = p.color;
        ctx.fillStyle = p.color; ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
        ctx.restore();

        if(Math.abs(player.x-p.x) < player.size*0.8 && Math.abs(player.y-p.y) < 25) {
            if(p.type === 'weapon') {
                weaponLevel = Math.min(weaponLevel + 1, 2);
                updateWeaponUI();
                weaponUI.style.display = 'block';
                setTimeout(() => weaponUI.style.display = 'none', 2000);
            }
            else if(p.type === 'slowmo') { slowMo = 60; }
            else if(p.type === 'coin') { coins += 5; coinsEl.textContent = coins; }
            powerups.splice(i, 1); playSound(700, 0.3, 'sine');
        }
        if(p.y > height) powerups.splice(i, 1);
    }

    for(let i = particles.length-1; i >= 0; i--) {
        const p = particles[i];
        if(p.type === 'ring') {
            p.life -= 0.05;
            ctx.globalAlpha = p.life;
            ctx.shadowBlur = 20; ctx.shadowColor = p.color;
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * (1 - p.life), 0, Math.PI*2);
            ctx.stroke();
        } else {
            p.x += p.vx * timeScale; p.y += p.vy * timeScale; p.life -= 0.025;
            ctx.globalAlpha = p.life;
            ctx.shadowBlur = 8; ctx.shadowColor = p.color;
            ctx.fillStyle = p.color;
            if(p.type === 'circle') {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size||5, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.fillRect(p.x, p.y, p.size||5, p.size||5);
            }
        }
        if(p.life <= 0) particles.splice(i, 1);
    }
    ctx.globalAlpha = 1.0; ctx.restore();
    frameCount++;
}

function endGame() {
    isGameOver = true;
    cancelAnimationFrame(animationId);
    overlay.style.display = 'flex';
    document.getElementById('finalScore').textContent = "Toplam Skor: " + score;
    document.getElementById('finalCombo').textContent = "Max Kombo: x" + maxCombo;
    document.getElementById('finalCoins').textContent = "Coin: " + coins;

    if(score > highScore) {
        highScore = score;
        localStorage.setItem('neonV7', highScore);
        highEl.textContent = highScore;
    }
}

function resetGame() {
    pauseMenu.style.display = 'none';
    init();
}

function shareScore() {
    const text = `Neon Striker V8.4 TEMPEST ile ${score} skor yaptım! Max Kombo: x${maxCombo} | Coin: ${coins} 🇬🇧⚡`;
    if(navigator.share) navigator.share({text});
    else navigator.clipboard.writeText(text).then(() => alert('Skor kopyalandı!'));
}

let resizeTimeout;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(init, 250);
});

init();
</script>
